name: Build and Publish Container Images

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'images/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Converts repository name to lowercase safely in bash later
  IMAGE_NAME_PREFIX: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/*

      - name: Set lower-case owner and image mappings
        id: repo_setup
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # Step 1: Force Build and Push of the Base Python + JS LSP Layer
      - name: Build and push Base Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/Dockerfile.base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo_setup.outputs.REPO_LOWER }}-base:latest
            ${{ env.REGISTRY }}/${{ steps.repo_setup.outputs.REPO_LOWER }}-base:${{ github.sha }}

      # Step 2: Build and Push Derived Go Layer (Consuming the freshly built Base image)
      - name: Build and push Go Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: images/Dockerfile.go
          push: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ steps.repo_setup.outputs.REPO_LOWER }}-base:latest
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo_setup.outputs.REPO_LOWER }}-go:latest
            ${{ env.REGISTRY }}/${{ steps.repo_setup.outputs.REPO_LOWER }}-go:${{ github.sha }}
